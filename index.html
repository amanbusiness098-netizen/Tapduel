<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapDuel</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>TapDuel</h1>

    <h2 id="status">Enter your name</h2>

    <input 
      type="text" 
      id="username" 
      placeholder="Enter username" 
      maxlength="12"
    >

    <div class="menuButtons">
      <button id="startBtn">
        QUICK MATCH
      </button>

      <button id="createRoomBtn">
        CREATE ROOM
      </button>
    </div>

    <div id="roomSection">
      <input
        type="text"
        id="roomInput"
        placeholder="Enter Room Code"
        maxlength="6"
      >

      <button id="joinRoomBtn">
        JOIN ROOM
      </button>
    </div>

    <button id="tapBtn" disabled>
      WAITING
    </button>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
