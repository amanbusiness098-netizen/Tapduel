<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapDuel - 1v1 Reaction Battle Game</title>
  <meta name="google-site-verification" content="wNIyho7MUn90jMWM2Sd53r3yuTClC1XRQF_NM3L7rTc" />
  <meta name="description"
    content="TapDuel is a fast 1v1 multiplayer reaction game. Challenge friends, test your speed, climb leaderboards, and prove your reaction time.">

  <meta name="keywords" content="TapDuel, reaction game, multiplayer game, 1v1 game, online reaction test, speed game">

  <meta property="og:title" content="TapDuel - 1v1 Reaction Battle">
  <meta property="og:description" content="Challenge your friends in a fast realtime reaction battle.">
  <meta property="og:url" content="https://tapduel.vercel.app">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>TapDuel</h1>
    <div id="liveStats">
      <span id="onlineCount">0 online</span>
      <span id="totalMatches">0 matches</span>
    </div>

    <h2 id="status">Enter your name</h2>

    <div id="playerInfo">
      <span id="youName"></span>
      <span id="vsText">VS</span>
      <span id="enemyName"></span>
    </div>

    <input type="text" id="username" placeholder="Enter username" maxlength="12">

    <div class="menuButtons">
      <button id="startBtn">QUICK MATCH</button>
      <button id="createRoomBtn">CREATE ROOM</button>
    </div>

    <div id="roomSection">
      <input type="text" id="roomInput" placeholder="Enter Room Code" maxlength="6">
      <button id="joinRoomBtn">JOIN ROOM</button>
    </div>

    <button id="tapBtn" disabled>WAITING</button>
    <button id="shareBtn" style="display:none;">
      SHARE RESULT
    </button>
    <button id="copyRoomBtn" style="display:none;">
      COPY ROOM LINK
    </button>
    <div id="playerStats">

      <h3>PLAYER STATS</h3>

      <div class="statsRow">
        <span>Wins</span>
        <span id="winsStat">0</span>
      </div>
      <div class="statsRow">
        <span>Level</span>
        <span id="levelStat">1</span>
      </div>

      <div class="statsRow">
        <span>XP</span>
        <span id="xpStat">0</span>
      </div>
      <div class="statsRow">
        <span>Rank</span>
        <span id="rankStat">Rookie</span>
      </div>

      <div class="statsRow">
        <span>Losses</span>
        <span id="lossesStat">0</span>
      </div>

      <div class="statsRow">
        <span>Games</span>
        <span id="gamesStat">0</span>
      </div>

      <div class="statsRow">
        <span>Fastest</span>
        <span id="fastestStat">0 ms</span>
      </div>

    </div>
    <div id="leaderboard">
      <h3>TOP REACTIONS</h3>
      <div id="leaderboardList">Loading...</div>
    </div>

    <div id="winsLeaderboard">
      <h3>TOP PLAYERS</h3>
      <div id="winsLeaderboardList">Loading...</div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      query,
      orderBy,
      limit,
      getDocs,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBQakzaEiRpJkxIMgsiLPfT3SiZ6p5o-A",
      authDomain: "tapduel-4670c.firebaseapp.com",
      projectId: "tapduel-4670c",
      storageBucket: "tapduel-4670c.firebasestorage.app",
      messagingSenderId: "1947914048068",
      appId: "1:947914048068:web:21786db89407f23d377211"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadLeaderboard() {
      const q = query(
        collection(db, "leaderboard"),
        orderBy("winnerReaction"),
        limit(10)
      );

      const snapshot = await getDocs(q);
      const leaderboardList = document.getElementById("leaderboardList");

      leaderboardList.innerHTML = "";

      snapshot.forEach((docSnap, index) => {
        const data = docSnap.data();

        const ranks = ["🥇", "🥈", "🥉"];
        const rank = ranks[index] || `#${index + 1}`;

        leaderboardList.innerHTML += `
      <div class="leaderboardItem">
        <span>${rank} ${data.winnerName || "Player"}</span>
        <span>${data.winnerReaction || 0} ms</span>
      </div>
    `;
      });
    }


    loadLeaderboard();
    loadWinsLeaderboard();
    async function loadPlayerStats() {

      const savedName = localStorage.getItem("tapduel_username");

      if (!savedName) return;

      const playerId = savedName
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "_");

      const playerRef = doc(db, "players", playerId);

      const snapshot = await getDoc(playerRef);

      if (!snapshot.exists()) return;

      const data = snapshot.data();
      document.getElementById("rankStat").innerText =
        data.rank || "Rookie";

      document.getElementById("levelStat").innerText =
        data.level || 1;

      document.getElementById("xpStat").innerText =
        data.xp || 0;

      document.getElementById("winsStat").innerText =
        data.wins || 0;

      document.getElementById("lossesStat").innerText =
        data.losses || 0;

      document.getElementById("gamesStat").innerText =
        data.gamesPlayed || 0;

      document.getElementById("fastestStat").innerText =
        (data.fastestReaction || 0) + " ms";

    }
    async function loadWinsLeaderboard() {
      const q = query(
        collection(db, "players"),
        orderBy("wins", "desc"),
        limit(10)
      );

      const snapshot = await getDocs(q);
      const list = document.getElementById("winsLeaderboardList");

      list.innerHTML = "";

      snapshot.forEach((docSnap, index) => {
        const data = docSnap.data();

        list.innerHTML += `
      <div class="leaderboardItem">
        <span>#${index + 1} ${data.username || "Player"}</span>
        <span>${data.wins || 0} wins</span>
      </div>
    `;
      });
    }

    loadPlayerStats();
    loadWinsLeaderboard();
  </script>

  <script src="script.js"></script>
</body>

</html>
